apiVersion: v1
kind: Service
metadata:
  name: {{ include "ephemeplay.fullname" . }}-redis
  labels:
    app.kubernetes.io/name: {{ include "ephemeplay.name" . }}
    app.kubernetes.io/component: redis
spec:
  selector:
    app.kubernetes.io/name: {{ include "ephemeplay.name" . }}
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ephemeplay.fullname" . }}-redis-headless
  labels:
    app.kubernetes.io/name: {{ include "ephemeplay.name" . }}
    app.kubernetes.io/component: redis
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ include "ephemeplay.name" . }}
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
