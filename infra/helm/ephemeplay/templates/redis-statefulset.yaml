apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ephemeplay.fullname" . }}-redis
  labels:
    app.kubernetes.io/name: {{ include "ephemeplay.name" . }}
    app.kubernetes.io/component: redis
spec:
  serviceName: {{ include "ephemeplay.fullname" . }}-redis-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ephemeplay.name" . }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ephemeplay.name" . }}
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --save
            - "60"
            - "1"
            - --loglevel
            - warning
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ephemeplay.fullname" . }}-secret
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          {{- with .Values.redis.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.redis.persistence.storageClassName | quote }}
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size }}
