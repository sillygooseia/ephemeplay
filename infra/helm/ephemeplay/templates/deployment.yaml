apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ephemeplay.fullname" . }}-backend
  labels:
    app.kubernetes.io/name: {{ include "ephemeplay.name" . }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ephemeplay.name" . }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ephemeplay.name" . }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port | int }}
          env:
            - name: PORT
              value: {{ .Values.env.PORT | quote }}
            - name: ROOM_TTL_MS
              value: {{ .Values.env.ROOM_TTL_MS | quote }}
            - name: CREATE_ROOM_RATE_LIMIT
              value: {{ .Values.env.CREATE_ROOM_RATE_LIMIT | quote }}
            - name: JOIN_ROOM_RATE_LIMIT
              value: {{ .Values.env.JOIN_ROOM_RATE_LIMIT | quote }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ephemeplay.fullname" . }}-secret
                  key: REDIS_URL
            - name: PLAYER_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "ephemeplay.fullname" . }}-secret
                  key: PLAYER_JWT_SECRET
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.port | int }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.port | int }}
            initialDelaySeconds: 20
            periodSeconds: 20
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
